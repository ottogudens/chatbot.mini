; ── Producción: nunca exponer errores al browser ──────────────────────────
; Si display_errors = On y PHP emite un warning antes del <!DOCTYPE html>,
; el browser recibe texto antes del HTML → no entra en standards mode →
; el bloque <style> inline se ignora → página sin CSS (bug visual detectado).
display_errors = Off
log_errors = On

; output_buffering = On garantiza que cualquier output prematuro (warnings,
; BOM, espacios) se retenga en buffer hasta que PHP genere los headers.
; Así session_start() y header() funcionan aunque haya output anterior.
output_buffering = On

; ── Limits ────────────────────────────────────────────────────────────────
upload_max_filesize = 64M
post_max_size       = 64M
max_execution_time  = 300
memory_limit        = 256M
