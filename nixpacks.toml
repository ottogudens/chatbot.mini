[phases.setup]
nixPkgs = ["...", "nginx", "nodejs"]

[phases.install]
cmds = ["npm install --prefix whatsapp"]

[phases.build]
cmds = [
    "mkdir -p /etc/nginx/conf.d",
    "echo 'client_max_body_size 500M;' > /etc/nginx/conf.d/upload_size.conf",
    "mkdir -p /app/uploads"
]

[start]
cmd = "node whatsapp/whatsapp.js & (nginx -g 'daemon off;' & php-fpm -F)"
