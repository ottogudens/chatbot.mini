[global]
error_log = /tmp/php-fpm.log
daemonize = no

[www]
user = nobody
group = nogroup
listen = 127.0.0.1:9001
pm = dynamic
pm.max_children = 15
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.process_idle_timeout = 30s
pm.max_requests = 500
catch_workers_output = yes
decorate_workers_output = no
clear_env = no

